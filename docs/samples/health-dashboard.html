<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>klamben Health Dashboard</title>
<style>
:root {
  --bg: #0f172a;
  --card-bg: rgba(255,255,255,0.05);
  --card-border: rgba(255,255,255,0.1);
  --card-blur: blur(12px);
  --gradient-accent: linear-gradient(135deg, #a78bfa, #38bdf8);
  --color-error: #f87171;
  --color-warning: #fbbf24;
  --color-info: #38bdf8;
  --color-visual: #a78bfa;
  --color-layout: #38bdf8;
  --color-platform: #34d399;
  --color-code-quality: #fb923c;
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --font-stack: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --max-width: 1200px;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-stack);
  background: var(--bg);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
}

.container {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 2rem 1.5rem;
}

/* Animations */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes progressFill {
  from { width: 0; }
}
@keyframes donutFill {
  from { background: conic-gradient(transparent 0deg, transparent 360deg); }
}

.fade-in {
  animation: fadeInUp 0.5s ease-out both;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 3rem;
  animation: fadeInUp 0.5s ease-out both;
}
.header .brand {
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  background: var(--gradient-accent);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 0.25rem;
}
.header h1 {
  font-size: 2.25rem;
  font-weight: 800;
  color: var(--text-primary);
  margin-bottom: 1rem;
}
.meta-pills {
  display: flex;
  justify-content: center;
  gap: 0.75rem;
  flex-wrap: wrap;
}
.meta-pill {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.35rem 0.85rem;
  background: var(--card-bg);
  backdrop-filter: var(--card-blur);
  border: 1px solid var(--card-border);
  border-radius: 999px;
  font-size: 0.8rem;
  color: var(--text-secondary);
}
.meta-pill svg {
  width: 14px;
  height: 14px;
  opacity: 0.7;
}

/* Cards (glass) */
.glass-card {
  background: var(--card-bg);
  backdrop-filter: var(--card-blur);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 1.5rem;
  transition: transform 0.2s, border-color 0.2s;
}
.glass-card:hover {
  transform: translateY(-2px);
  border-color: rgba(255,255,255,0.18);
}

/* Section titles */
.section-title {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 1.25rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.section-title svg {
  width: 20px;
  height: 20px;
  opacity: 0.8;
}

/* Health Score Donut */
.health-section {
  display: flex;
  justify-content: center;
  margin-bottom: 2.5rem;
  animation: fadeInUp 0.5s ease-out 0.1s both;
}
.donut-wrapper {
  position: relative;
  width: 200px;
  height: 200px;
}
.donut {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.donut-inner {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.donut-score {
  font-size: 3rem;
  font-weight: 800;
  line-height: 1;
  background: var(--gradient-accent);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.donut-label {
  font-size: 0.75rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 0.25rem;
}

/* Summary Cards */
.summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 1rem;
  margin-bottom: 2.5rem;
}
.summary-card {
  animation: fadeInUp 0.5s ease-out both;
  text-align: center;
}
.summary-card .card-value {
  font-size: 2rem;
  font-weight: 800;
  line-height: 1.2;
}
.summary-card .card-label {
  font-size: 0.8rem;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 0.25rem;
}
.summary-card .card-icon {
  width: 36px;
  height: 36px;
  margin: 0 auto 0.5rem;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.summary-card .card-icon svg {
  width: 20px;
  height: 20px;
}

/* Severity Bar */
.severity-section {
  margin-bottom: 2.5rem;
  animation: fadeInUp 0.5s ease-out 0.25s both;
}
.stacked-bar-container {
  width: 100%;
  height: 32px;
  border-radius: 16px;
  overflow: hidden;
  display: flex;
  background: rgba(255,255,255,0.03);
}
.stacked-segment {
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  font-weight: 700;
  color: #0f172a;
  transition: width 0.8s ease-out;
  min-width: 0;
}
.stacked-segment span {
  white-space: nowrap;
  overflow: hidden;
}
.severity-legend {
  display: flex;
  gap: 1.5rem;
  margin-top: 0.75rem;
  flex-wrap: wrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.8rem;
  color: var(--text-secondary);
}
.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

/* Category Bars */
.category-section {
  margin-bottom: 2.5rem;
  animation: fadeInUp 0.5s ease-out 0.3s both;
}
.category-bar-row {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 0.85rem;
}
.category-bar-label {
  width: 120px;
  font-size: 0.85rem;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 0.4rem;
  flex-shrink: 0;
}
.category-bar-track {
  flex: 1;
  height: 22px;
  background: rgba(255,255,255,0.03);
  border-radius: 11px;
  overflow: hidden;
}
.category-bar-fill {
  height: 100%;
  border-radius: 11px;
  transition: width 0.8s ease-out;
  animation: progressFill 0.8s ease-out;
}
.category-bar-count {
  width: 36px;
  text-align: right;
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--text-secondary);
}

/* Rule Coverage */
.coverage-section {
  margin-bottom: 2.5rem;
  animation: fadeInUp 0.5s ease-out 0.35s both;
}
.coverage-info {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.6rem;
}
.coverage-label {
  font-size: 0.9rem;
  color: var(--text-secondary);
}
.coverage-pct {
  font-size: 1rem;
  font-weight: 700;
  background: var(--gradient-accent);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.coverage-track {
  width: 100%;
  height: 18px;
  background: rgba(255,255,255,0.03);
  border-radius: 9px;
  overflow: hidden;
}
.coverage-fill {
  height: 100%;
  border-radius: 9px;
  background: var(--gradient-accent);
  transition: width 0.8s ease-out;
  animation: progressFill 0.8s ease-out;
}

/* Category Health */
.cat-health-section {
  margin-bottom: 2.5rem;
  animation: fadeInUp 0.5s ease-out 0.38s both;
}
.cat-health-row {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 0.85rem;
}
.cat-health-label {
  width: 140px;
  font-size: 0.85rem;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 0.4rem;
  flex-shrink: 0;
}
.cat-health-track {
  flex: 1;
  height: 22px;
  background: rgba(255,255,255,0.03);
  border-radius: 11px;
  overflow: hidden;
}
.cat-health-fill {
  height: 100%;
  border-radius: 11px;
  transition: width 0.8s ease-out;
  animation: progressFill 0.8s ease-out;
}
.cat-health-score {
  width: 50px;
  text-align: right;
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--text-secondary);
}

/* Recommendations */
.recs-section {
  margin-bottom: 2.5rem;
  animation: fadeInUp 0.5s ease-out 0.4s both;
}
.rec-card {
  background: var(--card-bg);
  backdrop-filter: var(--card-blur);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  padding: 1.1rem 1.25rem;
  margin-bottom: 0.75rem;
  border-left: 3px solid transparent;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
}
.rec-card:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 24px rgba(167, 139, 250, 0.08);
}
.rec-card-header {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 0.5rem;
  flex-wrap: wrap;
}
.rec-card-title {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--text-primary);
}
.rec-card-hint {
  font-size: 0.85rem;
  color: var(--text-secondary);
  line-height: 1.5;
}
.rec-card-count {
  margin-left: auto;
  font-size: 0.75rem;
  font-weight: 600;
  padding: 0.2rem 0.6rem;
  background: rgba(255,255,255,0.06);
  border-radius: 999px;
  color: var(--text-secondary);
}
.rec-empty {
  text-align: center;
  padding: 2rem;
  color: var(--text-muted);
  font-size: 0.95rem;
}
.rec-empty svg {
  width: 40px;
  height: 40px;
  margin-bottom: 0.75rem;
  opacity: 0.5;
}

/* Badges */
.severity-badge {
  font-size: 0.7rem;
  font-weight: 700;
  padding: 0.15rem 0.55rem;
  border-radius: 999px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  white-space: nowrap;
}
.severity-badge.error {
  background: rgba(248,113,113,0.15);
  color: var(--color-error);
}
.severity-badge.warning {
  background: rgba(251,191,36,0.15);
  color: var(--color-warning);
}
.severity-badge.info {
  background: rgba(56,189,248,0.15);
  color: var(--color-info);
}

/* Top Rules */
.top-rules-section {
  margin-bottom: 2.5rem;
  animation: fadeInUp 0.5s ease-out 0.45s both;
}
.rule-row {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.8rem 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.rule-row:last-child {
  border-bottom: none;
}
.rule-rank {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  background: rgba(255,255,255,0.05);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--text-muted);
  flex-shrink: 0;
}
.rule-info {
  flex: 1;
  min-width: 0;
}
.rule-title {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.rule-id {
  font-size: 0.75rem;
  color: var(--text-muted);
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
}
.rule-count {
  font-size: 1.1rem;
  font-weight: 800;
  color: var(--text-secondary);
  flex-shrink: 0;
}

/* Findings */
.findings-section {
  margin-bottom: 2.5rem;
  animation: fadeInUp 0.5s ease-out 0.5s both;
}
.findings-controls {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1rem;
}
.findings-controls button {
  padding: 0.4rem 0.85rem;
  background: var(--card-bg);
  backdrop-filter: var(--card-blur);
  border: 1px solid var(--card-border);
  border-radius: 8px;
  color: var(--text-secondary);
  font-size: 0.8rem;
  font-family: var(--font-stack);
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
}
.findings-controls button:hover {
  background: rgba(255,255,255,0.08);
  color: var(--text-primary);
}
.file-group {
  margin-bottom: 0.5rem;
}
.file-header {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.7rem 1rem;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.2s;
  user-select: none;
}
.file-header:hover {
  background: rgba(255,255,255,0.07);
}
.file-header .chevron {
  width: 16px;
  height: 16px;
  transition: transform 0.2s;
  flex-shrink: 0;
  color: var(--text-muted);
}
.file-header.open .chevron {
  transform: rotate(90deg);
}
.file-name {
  flex: 1;
  font-size: 0.85rem;
  font-weight: 600;
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.file-count {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--text-muted);
  background: rgba(255,255,255,0.05);
  padding: 0.15rem 0.5rem;
  border-radius: 999px;
}
.file-findings {
  display: none;
  padding: 0.25rem 0 0.25rem 1.5rem;
}
.file-findings.open {
  display: block;
}
.finding-item {
  display: flex;
  align-items: flex-start;
  gap: 0.6rem;
  padding: 0.6rem 0.75rem;
  margin-top: 0.35rem;
  background: rgba(255,255,255,0.02);
  border-radius: 8px;
  border-left: 2px solid transparent;
}
.finding-item.error { border-left-color: var(--color-error); }
.finding-item.warning { border-left-color: var(--color-warning); }
.finding-item.info { border-left-color: var(--color-info); }
.finding-message {
  flex: 1;
  font-size: 0.82rem;
  color: var(--text-secondary);
  line-height: 1.5;
}
.finding-loc {
  font-size: 0.72rem;
  color: var(--text-muted);
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  white-space: nowrap;
  flex-shrink: 0;
}

/* Footer */
.footer {
  text-align: center;
  padding: 2rem 0 1rem;
  border-top: 1px solid rgba(255,255,255,0.05);
  margin-top: 1rem;
}
.footer-brand {
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: var(--gradient-accent);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.footer-sub {
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-top: 0.25rem;
}

/* Celebration */
.celebration {
  text-align: center;
  padding: 2rem;
  font-size: 1.1rem;
  color: var(--text-secondary);
}
.celebration .big-emoji {
  font-size: 3rem;
  display: block;
  margin-bottom: 0.75rem;
}

/* Responsive */
@media (max-width: 640px) {
  .container { padding: 1rem; }
  .header h1 { font-size: 1.5rem; }
  .donut-wrapper, .donut { width: 160px; height: 160px; }
  .donut-inner { width: 112px; height: 112px; }
  .donut-score { font-size: 2.25rem; }
  .summary-grid { grid-template-columns: repeat(2, 1fr); }
  .category-bar-label, .cat-health-label { width: 90px; font-size: 0.78rem; }
  .rec-card-count { margin-left: 0; }
}
</style>
</head>

  <header class="header" id="header"></header>

  <section class="health-section" id="healthScore"></section>

  <!-- Summary Cards -->
  <section class="summary-grid" id="summaryCards"></section>

  <!-- Severity Distribution -->
  <section class="severity-section" id="severityDist"></section>

  <!-- Category Breakdown -->
  <section class="category-section" id="categoryBreakdown"></section>

  <!-- Rule Coverage Gauge -->
  <section class="coverage-section" id="ruleCoverage"></section>

  <!-- Category Health -->
  <section class="cat-health-section" id="catHealth"></section>

  <!-- Recommendations -->
  <section class="recs-section" id="recommendations"></section>

  <!-- Top Triggered Rules -->
  <section class="top-rules-section" id="topRules"></section>

  <!-- Findings Detail -->
  <section class="findings-section" id="findings"></section>

  <!-- Footer -->
  <footer class="footer" id="footer"></footer>

</div>

  // Escape HTML to prevent XSS when rendering data values
  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // Safe DOM element creation helpers
  function el(tag, attrs, children) {
    var node = document.createElement(tag);
    if (attrs) {
      Object.keys(attrs).forEach(function(k) {
        if (k === 'className') node.className = attrs[k];
        else if (k === 'textContent') node.textContent = attrs[k];
        else node.setAttribute(k, attrs[k]);
      });
    }
    if (typeof children === 'string') node.textContent = children;
    else if (Array.isArray(children)) children.forEach(function(c) { if (c) node.appendChild(c); });
    return node;
  }

  function svgMarkup(svg) {

      var bar = el('div', { className: 'stacked-bar-container' });

        if (count > 0) {
          var pct = (count / total * 100).toFixed(1);
          var seg = el('div', { className: 'stacked-segment' });
          seg.style.width = pct + '%';

        var info = el('div', { className: 'rule-info' });
        info.appendChild(el('div', { className: 'rule-title' }, r.title));
        info.appendChild(el('div', { className: 'rule-id' }, r.ruleId));
        row.appendChild(info);
        row.appendChild(el('div', { className: 'rule-count' }, String(r.count)));
        card.appendChild(row);
      });
    }

    section.appendChild(card);
  })();

  // Findings Detail
  (function renderFindings() {
    var byFile = D.byFile || {};
    var files = Object.keys(byFile).sort();
    var section = document.getElementById('findings');
    var card = el('div', { className: 'glass-card' });
    var title = el('div', { className: 'section-title' });
    title.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>';
    title.appendChild(document.createTextNode('Findings Detail'));
    card.appendChild(title);

    if (files.length > 0) {
      var controls = el('div', { className: 'findings-controls' });
      var expandBtn = el('button', { id: 'expandAll' }, 'Expand All');
      var collapseBtn = el('button', { id: 'collapseAll' }, 'Collapse All');
      controls.appendChild(expandBtn);
      controls.appendChild(collapseBtn);
      card.appendChild(controls);

      files.forEach(function(file, fi) {
        var items = byFile[file];
        var group = el('div', { className: 'file-group' });
        var hdr = el('div', { className: 'file-header' });
        hdr.setAttribute('data-idx', fi);
        hdr.innerHTML = '<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>';
        hdr.appendChild(el('span', { className: 'file-name' }, file));
        hdr.appendChild(el('span', { className: 'file-count' }, String(items.length)));
        group.appendChild(hdr);

        var panel = el('div', { className: 'file-findings' });
        panel.setAttribute('data-idx', fi);
        items.forEach(function(item) {
          var fi = el('div', { className: 'finding-item ' + esc(item.severity) });
          fi.appendChild(el('span', { className: 'severity-badge ' + esc(item.severity) }, item.severity));
          fi.appendChild(el('span', { className: 'finding-message' }, item.message));
          fi.appendChild(el('span', { className: 'finding-loc' }, 'L' + item.line + ':' + item.column));
          panel.appendChild(fi);
        });
        group.appendChild(panel);
        card.appendChild(group);
      });

      // Wire up expand/collapse after elements are in the DOM
      setTimeout(function() {
        document.querySelectorAll('.file-header').forEach(function(hdr) {
          hdr.addEventListener('click', function() {
            var idx = this.getAttribute('data-idx');
            var panel = document.querySelector('.file-findings[data-idx="' + idx + '"]');
            var isOpen = this.classList.toggle('open');
            if (isOpen) panel.classList.add('open');
            else panel.classList.remove('open');
          });
        });
        var eb = document.getElementById('expandAll');
        var cb = document.getElementById('collapseAll');
        if (eb) {
          eb.addEventListener('click', function() {
            document.querySelectorAll('.file-header').forEach(function(h) { h.classList.add('open'); });
            document.querySelectorAll('.file-findings').forEach(function(p) { p.classList.add('open'); });
          });
        }
        if (cb) {
          cb.addEventListener('click', function() {
            document.querySelectorAll('.file-header').forEach(function(h) { h.classList.remove('open'); });
            document.querySelectorAll('.file-findings').forEach(function(p) { p.classList.remove('open'); });
          });
        }
      }, 0);
    } else {
      var cele = el('div', { className: 'celebration' });
      cele.innerHTML = '<span class="big-emoji">&#10024;</span>';
      cele.appendChild(document.createTextNode('No findings to display.'));
      card.appendChild(cele);
    }

    section.appendChild(card);
  })();

  // Footer
  (function renderFooter() {
    var footer = document.getElementById('footer');
    footer.appendChild(el('div', { className: 'footer-brand' }, 'klamben'));
    footer.appendChild(el('div', { className: 'footer-sub' }, 'Flutter Design Anti-Pattern Detector \u00b7 Generated ' + dateStr));
  })();
});
</script>
</body>
</html>
