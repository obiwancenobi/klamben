include: package:lints/recommended.yaml

analyzer:
  exclude:
    - test/fixtures/**
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    unused_import: error
    unused_local_variable: warning

linter:
  rules:
    - prefer_const_constructors
    - prefer_final_locals
    - avoid_print
    - unnecessary_this
